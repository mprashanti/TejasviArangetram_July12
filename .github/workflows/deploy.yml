# Workflow for deploying a Vite React application to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"] # Aligns with your "main" branch seen in the screenshot
  workflow_dispatch:

# Grant necessary permissions for GitHub Pages to complete deployment
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # We use 'npm install' instead of 'npm ci' to safely bypass strict lockfile-drift crashes
      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Tells GitHub Actions to upload Vite's actual build output folder
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
