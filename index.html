<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tejasvi Vijay • Bharatanatyam Arangetram</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c5a059;
  --gold-dim:rgba(197,160,89,0.2);
  --gold-faint:rgba(197,160,89,0.08);
  --bg:#0a0a0a;
  --panel:#151515;
  --text:#e5e5e5;
  --text-dim:#9a9a9a;
  --text-faint:#6b6b6b;
  --serif:'Playfair Display',serif;
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  line-height:1.7;
  font-weight:300;
  overflow-x:hidden;
}
img{max-width:100%;display:block;}
a{color:inherit;}
.wrap{max-width:1280px;margin:0 auto;padding:0 24px;}
section{padding:96px 0;position:relative;}
.section-head{text-align:center;max-width:680px;margin:0 auto 64px;}
.section-head .label{
  color:var(--gold);font-family:var(--mono);font-size:11px;
  letter-spacing:3px;text-transform:uppercase;font-weight:500;
  display:block;margin-bottom:14px;
}
.section-head h2{
  font-family:var(--serif);font-weight:700;color:#fff;
  font-size:clamp(28px,5vw,46px);letter-spacing:-0.5px;line-height:1.15;
  margin-bottom:18px;
}
.section-head .rule{width:64px;height:1px;background:var(--gold);margin:0 auto 18px;}
.section-head p{color:var(--text-dim);font-size:14px;}
.card{
  background:var(--panel);border:1px solid var(--gold-dim);
  border-radius:24px;
}
.btn-gold{
  background:var(--gold);color:#0a0a0a;border:none;
  font-family:var(--mono);font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:2px;
  padding:14px 28px;border-radius:12px;cursor:pointer;
  transition:.25s;display:inline-flex;align-items:center;gap:8px;
  text-decoration:none;
}
.btn-gold:hover{background:#b08b46;}
.btn-outline{
  background:var(--panel);color:#fff;border:1px solid var(--gold-dim);
  font-family:var(--sans);font-size:12px;font-weight:500;
  text-transform:uppercase;letter-spacing:2px;
  padding:16px 28px;border-radius:16px;cursor:pointer;
  transition:.25s;display:inline-flex;align-items:center;justify-content:center;gap:8px;
  text-decoration:none;width:100%;
}
.btn-outline:hover{background:#1f1f1f;}
.gold{color:var(--gold);}

/* Generic content-section heading elements (used in Guru, Dancer, etc.) */
section .label{
  color:var(--gold);font-family:var(--mono);font-size:11px;
  letter-spacing:3px;text-transform:uppercase;font-weight:600;
  display:block;margin-bottom:14px;
}
section h2{
  font-family:var(--serif);font-weight:700;color:#fff;
  font-size:clamp(28px,5vw,44px);line-height:1.15;letter-spacing:-0.5px;
  margin-bottom:18px;
}
section .rule{width:64px;height:1px;background:var(--gold);margin-bottom:24px;}
section .body p{font-family:var(--serif);color:#cfcfcf;font-size:16px;line-height:1.85;margin-bottom:18px;}

/* ============ NAV ============ */
nav{
  position:fixed;top:0;left:0;width:100%;z-index:1000;
  background:rgba(10,10,10,0.85);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(197,160,89,0.12);
}
.nav-inner{
  max-width:1280px;margin:0 auto;padding:18px 24px;
  display:flex;align-items:center;justify-content:space-between;
}
.nav-logo{
  font-family:var(--serif);font-weight:700;font-size:20px;color:#fff;
  letter-spacing:1px;text-decoration:none;
}
.nav-logo .gold{font-style:italic;}
.nav-links{display:flex;gap:28px;list-style:none;}
.nav-links a{
  font-family:var(--mono);font-size:11px;text-transform:uppercase;
  letter-spacing:2px;color:var(--text-dim);text-decoration:none;
  transition:.2s;
}
.nav-links a:hover{color:var(--gold);}
.nav-toggle{display:none;background:none;border:none;color:var(--gold);cursor:pointer;padding:8px;}
.nav-toggle svg{width:24px;height:24px;}
@media(max-width:900px){
  .nav-links{
    position:fixed;top:64px;left:0;right:0;
    background:rgba(10,10,10,0.98);
    flex-direction:column;align-items:center;gap:0;
    max-height:0;overflow:hidden;transition:max-height .35s ease;
    border-bottom:1px solid var(--gold-dim);
  }
  .nav-links.open{max-height:520px;}
  .nav-links li{width:100%;text-align:center;}
  .nav-links a{display:block;padding:16px;border-bottom:1px solid rgba(255,255,255,0.04);}
  .nav-toggle{display:block;}
}

/* ============ HERO ============ */
#hero{
  min-height:100vh;display:flex;align-items:center;
  padding-top:120px;padding-bottom:60px;
  background:
    radial-gradient(circle at 90% 5%, rgba(197,160,89,0.10), transparent 35%),
    radial-gradient(circle at 5% 95%, rgba(197,160,89,0.06), transparent 35%),
    var(--bg);
}
.hero-grid{
  display:grid;grid-template-columns:1.4fr 1fr;gap:64px;align-items:center;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:7px 16px;border:1px solid var(--gold-dim);background:var(--gold-faint);
  border-radius:50px;font-family:var(--mono);font-size:11px;
  text-transform:uppercase;letter-spacing:3px;color:var(--gold);
  margin-bottom:28px;
}
.hero-eyebrow{font-family:var(--serif);font-style:italic;color:var(--gold);font-size:20px;margin-bottom:6px;}
.hero h1{
  font-family:var(--serif);font-weight:700;color:#fff;
  font-size:clamp(48px,9vw,84px);line-height:1;letter-spacing:-1px;margin-bottom:24px;
}
.hero-rule{width:96px;height:1px;background:var(--gold);margin-bottom:28px;}
.detail-card{
  background:var(--panel);border:1px solid var(--gold-dim);border-radius:20px;
  padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:36px;
}
.detail-item{display:flex;gap:12px;align-items:flex-start;}
.detail-item svg{flex-shrink:0;margin-top:2px;color:var(--gold);width:18px;height:18px;}
.detail-item .label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--gold);font-weight:600;display:block;margin-bottom:3px;}
.detail-item .main{font-size:14px;font-weight:500;color:#fff;}
.detail-item .sub{font-size:12px;color:var(--text-faint);margin-top:1px;}
.detail-full{grid-column:1/-1;border-top:1px solid var(--gold-dim);padding-top:18px;}
.countdown-label{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:3px;color:var(--gold);font-weight:600;margin-bottom:14px;}
.countdown{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:380px;}
.countdown .cd{
  background:var(--panel);border:1px solid var(--gold-dim);border-radius:14px;
  text-align:center;padding:14px 6px;
}
.countdown .cd .num{font-family:var(--mono);font-weight:700;font-size:clamp(22px,3vw,30px);color:#fff;display:block;}
.countdown .cd .lab{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--text-faint);}

.hero-art{
  position:relative;aspect-ratio:3/4;border-radius:28px;
  background:#0a0a0a;border:1px solid var(--gold-dim);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  box-shadow:0 30px 60px -20px rgba(0,0,0,0.6);
}
.hero-art img{width:100%;height:100%;object-fit:contain;}
.hero-art .corner{position:absolute;width:28px;height:28px;border-color:var(--gold-dim);z-index:2;}
.hero-art .tl{top:14px;left:14px;border-top:2px solid var(--gold);border-left:2px solid var(--gold);}
.hero-art .tr{top:14px;right:14px;border-top:2px solid var(--gold);border-right:2px solid var(--gold);}
.hero-art .bl{bottom:14px;left:14px;border-bottom:2px solid var(--gold);border-left:2px solid var(--gold);}
.hero-art .br{bottom:14px;right:14px;border-bottom:2px solid var(--gold);border-right:2px solid var(--gold);}
.hero-art .caption{
  position:absolute;bottom:18px;left:0;right:0;text-align:center;z-index:2;
  background:linear-gradient(to top, rgba(0,0,0,0.85), transparent);
  padding-top:40px;
}
.hero-art .caption .name{font-family:var(--serif);font-size:14px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:600;}
.hero-art .caption .date{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-top:4px;}

.scroll-cue{
  text-align:center;margin-top:48px;
  font-family:var(--mono);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.3);
}
.scroll-cue svg{display:block;margin:8px auto 0;color:var(--gold);width:16px;height:16px;animation:bounce 2s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(6px);}}

@media(max-width:900px){
  .hero-grid{grid-template-columns:1fr;gap:48px;}
  .detail-card{grid-template-columns:1fr;}
  .hero-art{max-width:380px;margin:0 auto;}
}

/* ============ INVITATION ============ */
#invitation{background:var(--bg);}
.invite-card{
  background:var(--panel);border:2px solid var(--gold-dim);border-radius:28px;
  padding:64px 48px;text-align:center;position:relative;max-width:760px;margin:0 auto;
  overflow:hidden;
}
.invite-card .corner{position:absolute;width:44px;height:44px;border-color:var(--gold);}
.invite-card .tl{top:14px;left:14px;border-top:2px solid var(--gold);border-left:2px solid var(--gold);}
.invite-card .tr{top:14px;right:14px;border-top:2px solid var(--gold);border-right:2px solid var(--gold);}
.invite-card .bl{bottom:14px;left:14px;border-bottom:2px solid var(--gold);border-left:2px solid var(--gold);}
.invite-card .br{bottom:14px;right:14px;border-bottom:2px solid var(--gold);border-right:2px solid var(--gold);}
.invite-icon{width:72px;height:72px;margin:0 auto 22px;color:var(--gold);}
.invite-card .tag{
  font-family:var(--serif);font-size:19px;font-weight:500;letter-spacing:3px;
  text-transform:uppercase;color:var(--gold);display:block;margin-bottom:18px;
}
.invite-rule{width:120px;height:1px;background:var(--gold-dim);margin:0 auto 32px;}
.invite-card p{font-family:var(--serif);font-size:17px;color:#cfcfcf;font-style:italic;font-weight:300;line-height:1.8;}
.invite-card h3{
  font-family:var(--serif);font-weight:700;color:var(--gold);
  font-size:clamp(30px,5vw,48px);letter-spacing:1px;margin:26px 0;
  text-shadow:0 1px 18px rgba(197,160,89,0.18);
}
.invite-footer{margin-top:34px;}
.invite-footer .from{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:3px;color:var(--gold);font-weight:600;}
.invite-footer .names{font-family:var(--serif);font-weight:600;font-size:clamp(18px,3vw,26px);color:#fff;letter-spacing:1px;margin-top:8px;}
.invite-footer .loc{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--text-faint);margin-top:6px;}

/* ============ ABOUT BHARATANATYAM ============ */
#about-dance .about-grid{display:grid;grid-template-columns:1.05fr 1fr;gap:64px;align-items:center;}
#about-dance .label{color:var(--gold);font-family:var(--mono);font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:600;display:block;margin-bottom:14px;}
#about-dance h2{font-family:var(--serif);font-weight:700;color:#fff;font-size:clamp(28px,5vw,44px);line-height:1.15;margin-bottom:18px;}
#about-dance .rule{width:64px;height:1px;background:var(--gold);margin-bottom:24px;}
#about-dance .body p{font-family:var(--serif);color:#cfcfcf;font-size:16px;line-height:1.85;margin-bottom:18px;}
#about-dance .quote-block{
  border-left:4px solid var(--gold);background:var(--panel);
  padding:16px 20px;border-radius:0 12px 12px 0;font-style:italic;color:var(--gold);
}
.bento{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.bento-wide{grid-column:1/-1;}
.bento .card{padding:24px;}
.bento-wide.card{display:flex;align-items:center;justify-content:space-between;gap:16px;}
.bento-wide .tag{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--gold);display:block;margin-bottom:6px;}
.bento-wide h4{font-family:var(--serif);font-weight:700;color:var(--gold);font-size:18px;margin-bottom:8px;}
.bento-wide p{font-size:12px;color:var(--text-dim);line-height:1.6;}
.bento-icon{width:60px;height:60px;flex-shrink:0;}
.elem-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.elem-icon svg{width:20px;height:20px;}
.elem-card h4{font-family:var(--serif);font-weight:700;color:#fff;font-size:17px;margin-bottom:4px;}
.elem-card .sub{font-family:var(--mono);font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:2px;font-weight:600;margin-bottom:12px;}
.elem-card p{font-size:12px;color:var(--text-dim);line-height:1.6;}
@media(max-width:900px){
  #about-dance .about-grid{grid-template-columns:1fr;gap:40px;}
  .bento{grid-template-columns:1fr;}
}

/* ============ THE GURU ============ */
#guru .guru-grid{display:grid;grid-template-columns:0.9fr 1.1fr;gap:64px;align-items:center;}
.altar-card{
  background:var(--panel);border:1px solid var(--gold-dim);border-radius:24px;
  padding:32px;text-align:center;position:relative;overflow:hidden;
}
.altar-card img{
  width:160px;height:160px;border-radius:50%;object-fit:cover;
  border:4px solid var(--gold);margin:0 auto 18px;display:block;
  box-shadow:0 0 40px rgba(197,160,89,0.15);
}
.altar-card .name{font-family:var(--sans);font-weight:500;color:#fff;font-size:17px;}
.altar-card .quote{font-family:var(--serif);font-size:12px;color:var(--gold);font-style:italic;margin-top:6px;}
.altar-card .role{font-family:var(--mono);font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:2px;font-weight:600;margin-top:6px;}
.guru-quote{
  background:var(--panel);border-left:4px solid var(--gold);border-radius:0 16px 16px 0;
  padding:24px;margin-top:26px;position:relative;
}
.guru-quote p{font-family:var(--serif);font-style:italic;color:#d8d8d8;font-size:15px;line-height:1.8;}
.guru-quote .attr{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--gold);font-weight:600;display:block;margin-top:10px;}
@media(max-width:900px){
  #guru .guru-grid{grid-template-columns:1fr;gap:40px;}
}

/* ============ THE DANCER ============ */
#dancer .dancer-grid{display:grid;grid-template-columns:0.85fr 1.15fr;gap:64px;align-items:start;}
.dancer-portrait{
  background:var(--panel);border:1px solid var(--gold-dim);border-radius:24px;
  padding:24px;text-align:center;position:relative;overflow:hidden;
}
.dancer-portrait .corner{position:absolute;width:24px;height:24px;}
.dancer-portrait .tl{top:12px;left:12px;border-top:1px solid var(--gold);border-left:1px solid var(--gold);}
.dancer-portrait .tr{top:12px;right:12px;border-top:1px solid var(--gold);border-right:1px solid var(--gold);}
.dancer-portrait .bl{bottom:12px;left:12px;border-bottom:1px solid var(--gold);border-left:1px solid var(--gold);}
.dancer-portrait .br{bottom:12px;right:12px;border-bottom:1px solid var(--gold);border-right:1px solid var(--gold);}
.dancer-portrait .tagline{font-family:var(--mono);font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:3px;margin-bottom:18px;}
.dancer-portrait img{
  width:100%;border-radius:16px;object-fit:cover;aspect-ratio:3/4;
}
.dancer-portrait .name{font-family:var(--serif);font-weight:700;color:var(--gold);font-size:22px;letter-spacing:1px;margin-top:18px;}
.dancer-portrait .role{font-family:var(--mono);font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px;margin-top:4px;}
.dancer-badge{
  display:inline-flex;align-items:center;gap:6px;margin-top:14px;
  font-family:var(--mono);font-size:10px;text-transform:uppercase;color:var(--gold);
  background:var(--gold-faint);border:1px solid var(--gold-dim);border-radius:50px;padding:6px 14px;
}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;border-bottom:1px solid var(--gold-dim);padding-bottom:14px;margin-bottom:28px;}
.tab-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  background:var(--panel);border:1px solid var(--gold-dim);color:var(--text-dim);
  font-family:var(--sans);font-size:12px;font-weight:500;padding:14px 8px;
  border-radius:12px;cursor:pointer;transition:.2s;
}
.tab-btn svg{width:15px;height:15px;flex-shrink:0;}
.tab-btn.active{background:var(--gold);color:#0a0a0a;font-weight:600;border-color:var(--gold);}
.tab-panel{background:var(--panel);border:1px solid var(--gold-dim);border-radius:24px;padding:36px;min-height:280px;}
.tab-content{display:none;font-family:var(--serif);font-size:15px;color:#d8d8d8;line-height:1.85;}
.tab-content.active{display:block;}
.tab-content h4{font-family:var(--serif);font-weight:700;color:var(--gold);font-size:24px;margin-bottom:16px;}
.tab-content p{margin-bottom:14px;}
.tab-content .quote-line{font-style:italic;color:var(--gold);}
.ach-list{list-style:none;display:flex;flex-direction:column;gap:16px;font-family:var(--sans);font-size:13px;color:var(--text-dim);}
.ach-list li{display:flex;gap:12px;align-items:flex-start;}
.ach-list .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);margin-top:6px;flex-shrink:0;}
.ach-list strong{font-family:var(--serif);font-weight:700;color:#fff;font-size:15px;display:block;margin-bottom:2px;}
@media(max-width:900px){
  #dancer .dancer-grid{grid-template-columns:1fr;gap:40px;}
  .tabs{grid-template-columns:repeat(2,1fr);}
}

/* ============ BLESSINGS ============ */
#blessings{text-align:center;}
.blessings-quote{font-family:var(--serif);font-style:italic;color:var(--text-dim);font-size:16px;max-width:600px;margin:0 auto;}
.blessings-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;max-width:760px;margin:48px auto 0;}
.blessing-card{
  background:var(--panel);border:1px solid var(--gold-dim);border-radius:24px;
  padding:20px;aspect-ratio:3/4;display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:.3s;
}
.blessing-card:hover{border-color:rgba(197,160,89,0.5);}
.blessing-card img{width:100%;height:100%;object-fit:contain;border-radius:12px;}
.blessing-card .name{font-family:var(--sans);font-weight:500;color:#fff;font-size:15px;margin-top:14px;}
@media(max-width:760px){
  .blessings-grid{grid-template-columns:1fr;max-width:340px;}
  .blessing-card{aspect-ratio:3/4;}
}

/* ============ PROGRAMME ============ */
.prog-grid{display:grid;grid-template-columns:0.85fr 1.15fr;gap:48px;align-items:start;}
.prog-list{display:flex;flex-direction:column;gap:10px;}
.prog-item{
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  background:var(--panel);border:1px solid rgba(255,255,255,0.05);border-radius:16px;
  padding:16px;cursor:pointer;transition:.2s;text-align:left;width:100%;
  font-family:inherit;color:inherit;
}
.prog-item:hover{border-color:rgba(255,255,255,0.15);}
.prog-item.active{background:var(--gold-faint);border-color:rgba(197,160,89,0.5);box-shadow:0 0 18px rgba(197,160,89,0.12);}
.prog-left{display:flex;align-items:center;gap:14px;}
.prog-num{
  width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-weight:700;font-size:12px;background:rgba(255,255,255,0.05);color:var(--text-dim);
  flex-shrink:0;
}
.prog-item.active .prog-num{background:var(--gold);color:#0a0a0a;}
.prog-item h4{font-family:var(--serif);font-weight:600;font-size:15px;color:#e5e5e5;}
.prog-item.active h4{color:#fff;}
.prog-item .ptype{font-family:var(--mono);font-size:9px;color:var(--text-faint);text-transform:uppercase;letter-spacing:2px;margin-top:2px;}
.prog-item svg{width:14px;height:14px;color:var(--text-faint);flex-shrink:0;}
.prog-item.active svg{color:var(--gold);}

.prog-detail{background:var(--panel);border:1px solid var(--gold-dim);border-radius:24px;padding:32px;}
.prog-detail .ptag{font-family:var(--mono);font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:3px;font-weight:700;display:block;margin-bottom:6px;}
.prog-detail h3{font-family:var(--serif);font-weight:700;color:#fff;font-size:30px;letter-spacing:1px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:20px;}
.prog-meta{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:22px;}
.prog-meta div{background:rgba(255,255,255,0.04);border-radius:12px;padding:12px 8px;text-align:center;}
.prog-meta svg{width:15px;height:15px;color:var(--gold);margin-bottom:4px;}
.prog-meta .pl{font-family:var(--mono);font-size:8px;text-transform:uppercase;color:var(--text-dim);display:block;}
.prog-meta .pv{font-family:var(--serif);font-weight:700;color:#fff;font-size:12px;display:block;margin-top:3px;}
.prog-detail h5{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--gold);font-weight:600;margin-bottom:8px;}
.prog-detail .desc{font-size:13px;color:var(--text-dim);line-height:1.8;margin-bottom:18px;}
.prog-sig{background:var(--gold-faint);border:1px solid var(--gold-dim);border-radius:16px;padding:20px;}
.prog-sig p{font-family:var(--serif);font-style:italic;font-size:14px;color:#d8d8d8;line-height:1.8;}
@media(max-width:900px){
  .prog-grid{grid-template-columns:1fr;}
  .prog-meta{grid-template-columns:1fr 1fr 1fr;}
}

/* ============ GALLERY ============ */
#acknowledgements .tag{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--gold);display:block;margin-bottom:6px;font-weight:600;}
#acknowledgements .card{padding:24px;}
.gallery-filters{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:44px;}
.gfilter{
  font-family:var(--sans);font-size:11px;text-transform:uppercase;letter-spacing:2px;font-weight:500;
  padding:10px 20px;border-radius:50px;cursor:pointer;border:1px solid var(--gold-dim);
  background:var(--panel);color:#e5e5e5;transition:.2s;
}
.gfilter.active{background:var(--gold);color:#0a0a0a;font-weight:600;border-color:var(--gold);}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:44px;}
.gallery-item{
  position:relative;border-radius:20px;overflow:hidden;aspect-ratio:3/4;cursor:pointer;
  border:1px solid var(--gold-dim);background:#000;
}
.gallery-item img{width:100%;height:100%;object-fit:contain;transition:.4s;}
.gallery-item:hover img{transform:scale(1.06);}
.gallery-overlay{
  position:absolute;inset:0;background:linear-gradient(to top, rgba(10,10,10,0.92), rgba(10,10,10,0.2) 60%, transparent);
  opacity:0;transition:.25s;display:flex;flex-direction:column;justify-content:flex-end;padding:20px;text-align:left;
}
.gallery-item:hover .gallery-overlay{opacity:1;}
.gallery-overlay .gcat{font-family:var(--mono);font-size:9px;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;}
.gallery-overlay h4{font-family:var(--serif);font-weight:700;color:#fff;font-size:16px;}
.gallery-overlay p{font-size:11px;color:#ccc;margin-top:4px;line-height:1.5;}
.gallery-item[data-cat]{display:block;}
.gallery-item.hidden{display:none;}

.lightbox{
  position:fixed;inset:0;background:rgba(10,10,10,0.95);backdrop-filter:blur(8px);
  z-index:2000;display:none;align-items:center;justify-content:center;padding:24px;
}
.lightbox.open{display:flex;}
.lightbox-card{
  background:var(--panel);border:1px solid var(--gold-dim);border-radius:24px;
  max-width:880px;width:100%;display:flex;overflow:hidden;position:relative;max-height:80vh;
}
.lightbox-card .lb-img{flex:1.4;background:#000;display:flex;align-items:center;justify-content:center;}
.lightbox-card .lb-img img{width:100%;height:100%;object-fit:contain;max-height:80vh;}
.lightbox-card .lb-info{flex:1;padding:32px;text-align:left;display:flex;flex-direction:column;justify-content:space-between;}
.lightbox-card .lb-info .gcat{font-family:var(--mono);font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:3px;font-weight:700;}
.lightbox-card .lb-info h3{font-family:var(--serif);font-weight:700;color:#fff;font-size:24px;margin:10px 0;}
.lightbox-card .lb-info p{font-size:13px;color:var(--text-dim);line-height:1.7;}
.lb-close{
  position:absolute;top:14px;right:14px;background:rgba(255,255,255,0.1);border:none;
  width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:#fff;cursor:pointer;z-index:5;
}
.lb-close:hover{background:rgba(255,255,255,0.2);}
@media(max-width:900px){
  .gallery-grid{grid-template-columns:repeat(2,1fr);}
  .lightbox-card{flex-direction:column;max-height:90vh;}
  .lightbox-card .lb-img img{max-height:300px;}
}

/* ============ GRATITUDE ============ */
.grat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
.grat-card{background:var(--panel);border:1px solid rgba(197,160,89,0.15);border-radius:24px;padding:20px;text-align:left;transition:.2s;}
.grat-card:hover{border-color:rgba(197,160,89,0.4);}
.grat-thumb{
  aspect-ratio:16/9;border-radius:16px;background:#111;border:1px solid rgba(255,255,255,0.05);
  display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;margin-bottom:16px;
}
.grat-thumb svg{width:48px;height:48px;color:var(--gold);opacity:0.45;}
.grat-thumb .dur{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.65);color:#ccc;font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:4px;}
.grat-thumb .play{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);
}
.grat-thumb .play .circle{width:46px;height:46px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;}
.grat-thumb .play svg{width:18px;height:18px;color:#0a0a0a;opacity:1;margin-left:2px;}
.grat-card .gsrc{font-family:var(--mono);font-size:9px;color:var(--gold);text-transform:uppercase;letter-spacing:2px;font-weight:700;}
.grat-card h4{font-family:var(--serif);font-weight:700;color:#fff;font-size:17px;line-height:1.4;margin:6px 0 10px;}
.grat-card p{font-size:12px;color:var(--text-dim);line-height:1.6;}
@media(max-width:900px){
  .grat-grid{grid-template-columns:1fr;}
}

/* ============ VENUE & DIRECTIONS ============ */
.venue-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:stretch;}
.sched-item{background:var(--panel);border-left:2px solid var(--gold-dim);border-radius:0 16px 16px 0;padding:18px 20px;margin-bottom:14px;}
.sched-item.main{border-left-color:var(--gold);}
.sched-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.sched-time{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;display:flex;align-items:center;gap:6px;}
.sched-time svg{width:13px;height:13px;}
.sched-badge{font-family:var(--mono);font-size:9px;text-transform:uppercase;font-weight:700;color:var(--gold);background:var(--gold-faint);border:1px solid var(--gold-dim);border-radius:4px;padding:2px 8px;}
.sched-item h4{font-family:var(--serif);font-weight:700;color:#fff;font-size:15px;margin-bottom:4px;}
.sched-item p{font-size:12px;color:var(--text-dim);line-height:1.6;}
.addr-card{
  background:var(--panel);border:1px solid var(--gold-dim);border-radius:20px;padding:22px;
  display:flex;gap:16px;align-items:flex-start;margin-top:18px;
}
.addr-card .icon{background:var(--gold-faint);color:var(--gold);border-radius:14px;padding:12px;flex-shrink:0;}
.addr-card .icon svg{width:22px;height:22px;}
.addr-card .l1{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--gold);font-weight:600;}
.addr-card h4{font-family:var(--serif);font-weight:600;color:#fff;font-size:16px;margin:3px 0;}
.addr-card p{font-size:12px;color:rgba(197,160,89,0.8);}

.map-frame{
  background:var(--panel);border:1px solid var(--gold-dim);border-radius:24px;padding:14px;
  display:flex;flex-direction:column;height:100%;min-height:380px;
}
.map-visual{
  flex:1;background:#161616;border-radius:18px;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.map-visual .road{position:absolute;background:#222;opacity:0.6;}
.map-visual .pin{
  display:flex;flex-direction:column;align-items:center;z-index:2;
}
.map-visual .pin .circle{
  width:48px;height:48px;border-radius:50%;background:var(--panel);border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
}
.map-visual .pin .circle svg{width:24px;height:24px;color:var(--gold);}
.map-visual .pin .tag{
  margin-top:10px;background:#000;border:1px solid var(--gold-dim);color:#fff;font-family:var(--mono);
  font-size:9px;text-transform:uppercase;letter-spacing:2px;font-weight:700;padding:5px 14px;border-radius:50px;white-space:nowrap;
}
.map-visual .legend{
  position:absolute;bottom:10px;left:10px;background:rgba(21,21,21,0.95);border:1px solid var(--gold-dim);
  border-radius:10px;padding:10px;font-family:var(--mono);font-size:9px;color:#ccc;display:flex;flex-direction:column;gap:6px;
}
.map-visual .legend .row{display:flex;align-items:center;gap:6px;}
.map-visual .legend .sw{width:10px;height:10px;border-radius:2px;}
.map-bottom{
  background:var(--panel);border-top:1px solid rgba(255,255,255,0.05);
  display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 8px 4px;
}
.map-bottom h5{font-family:var(--serif);font-weight:700;color:#fff;font-size:13px;}
.map-bottom p{font-size:10px;color:var(--text-dim);margin-top:2px;}
.map-bottom a{
  background:var(--gold);width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.map-bottom a svg{width:18px;height:18px;color:#0a0a0a;}
@media(max-width:900px){
  .venue-grid{grid-template-columns:1fr;}
}

/* ============ ACKNOWLEDGEMENTS ============ */
.guest-grid{display:grid;grid-template-columns:0.8fr 1.2fr;gap:48px;align-items:start;}
.guest-form{background:var(--panel);border:1px solid var(--gold-dim);border-radius:24px;padding:28px;}
.guest-form h3{font-family:var(--serif);font-weight:700;color:var(--gold);font-size:19px;display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.guest-form h3 svg{width:18px;height:18px;}
.guest-form > p{font-size:12px;color:var(--text-dim);margin-bottom:22px;}
.gform-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;font-weight:700;color:#e5e5e5;letter-spacing:1px;display:block;margin-bottom:6px;}
.gform-label .req{color:#fb7185;}
.gform input, .gform textarea{
  width:100%;background:var(--bg);border:1px solid var(--gold-dim);color:#e5e5e5;
  border-radius:12px;padding:12px 14px;font-size:13px;font-family:var(--sans);outline:none;transition:.2s;resize:none;
}
.gform input:focus, .gform textarea:focus{border-color:var(--gold);}
.gform > div{margin-bottom:18px;}
.flower-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.flower-opt{
  padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:var(--bg);
  text-align:left;cursor:pointer;transition:.2s;
}
.flower-opt.selected{background:var(--gold-faint);border-color:var(--gold);}
.flower-opt .fname{font-family:var(--serif);font-weight:700;font-size:12px;color:var(--text-dim);display:block;}
.flower-opt.selected .fname{color:var(--gold);}
.flower-opt .fmeaning{font-size:9px;color:#6b6b6b;margin-top:2px;display:block;}
.gsubmit{
  width:100%;background:var(--gold);color:#0a0a0a;border:none;border-radius:12px;
  font-family:var(--sans);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:2px;
  padding:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s;
}
.gsubmit:hover{background:#b08b46;}
.gform-error{
  background:rgba(244,63,94,0.08);border:1px solid rgba(244,63,94,0.3);color:#fda4af;
  font-size:12px;padding:10px 14px;border-radius:12px;margin-bottom:14px;display:flex;gap:8px;align-items:center;
}

.guest-board{max-height:660px;overflow-y:auto;padding-right:6px;}
.guest-board-head{
  display:flex;align-items:center;justify-content:space-between;font-family:var(--serif);font-weight:700;color:#fff;
  font-size:19px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:16px;
}
.guest-count{
  font-family:var(--mono);font-size:10px;color:var(--gold);text-transform:uppercase;font-weight:700;
  background:var(--gold-faint);border:1px solid var(--gold-dim);border-radius:50px;padding:5px 14px;
}
.guest-msg{
  background:var(--panel);border:1px solid rgba(197,160,89,0.15);border-radius:18px;padding:18px;
  display:flex;gap:14px;align-items:flex-start;margin-bottom:12px;
}
.guest-msg .gicon{width:44px;height:44px;border-radius:50%;background:var(--bg);border:1px solid var(--gold-dim);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.guest-msg .gicon svg{width:20px;height:20px;color:var(--gold);}
.guest-msg .gname{font-family:var(--serif);font-weight:700;color:#fff;font-size:14px;}
.guest-msg .gcity{font-family:var(--mono);font-size:10px;color:var(--text-dim);display:flex;align-items:center;gap:4px;}
.guest-msg .gcity svg{width:11px;height:11px;color:var(--gold);}
.guest-msg .gtop{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.guest-msg .gmsg{font-family:var(--serif);font-style:italic;font-size:13px;color:#d8d8d8;line-height:1.7;}
.guest-msg .gfooter{
  display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--text-faint);
  border-top:1px solid rgba(255,255,255,0.05);padding-top:8px;margin-top:10px;text-transform:uppercase;
}
@media(max-width:900px){
  .guest-grid{grid-template-columns:1fr;}
}

/* ============ SPLASH MODAL ============ */
.splash{
  position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(6px);z-index:3000;
  display:none;align-items:center;justify-content:center;padding:24px;
}
.splash.open{display:flex;}
.splash-card{
  background:var(--panel);border:1px solid rgba(197,160,89,0.5);border-radius:24px;
  padding:48px 32px;text-align:center;max-width:380px;width:100%;
}
.splash-card svg.spark{width:56px;height:56px;color:var(--gold);margin:0 auto 16px;}
.splash-card h3{font-family:var(--serif);font-weight:700;color:#fff;font-size:26px;margin-bottom:6px;}
.splash-card .sub{font-family:var(--mono);font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:20px;}
.splash-card svg.lotus{width:80px;height:80px;margin:0 auto 20px;}
.splash-card p{font-family:var(--serif);font-style:italic;color:#d8d8d8;font-size:14px;line-height:1.7;margin-bottom:22px;}

/* ============ FOOTER ============ */
footer{
  border-top:1px solid var(--gold-dim);padding:48px 0;text-align:center;
  font-family:var(--mono);font-size:11px;color:var(--text-faint);letter-spacing:2px;text-transform:uppercase;
}
footer .fnames{font-family:var(--serif);font-weight:700;color:#fff;font-size:17px;letter-spacing:1px;margin-bottom:10px;text-transform:none;}

/* ============ BACKGROUND MUSIC BUTTON ============ */
.music-btn{
  position:fixed;bottom:22px;right:22px;z-index:1500;
  width:54px;height:54px;border-radius:50%;
  background:var(--gold);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(0,0,0,0.45);transition:.25s;
}
.music-btn:hover{background:#b08b46;transform:scale(1.05);}
.music-btn svg{width:22px;height:22px;color:#0a0a0a;}
.music-btn .ic-pause{display:none;}
.music-btn.playing .ic-play{display:none;}
.music-btn.playing .ic-pause{display:block;}
.music-btn.playing{animation:musicpulse 2s ease-in-out infinite;}
@keyframes musicpulse{0%,100%{box-shadow:0 8px 24px rgba(0,0,0,0.45);}50%{box-shadow:0 0 0 6px rgba(197,160,89,0.18),0 8px 24px rgba(0,0,0,0.45);}}
@media(max-width:600px){.music-btn{width:48px;height:48px;bottom:16px;right:16px;}}
</style>
